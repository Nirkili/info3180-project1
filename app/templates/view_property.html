{% extends "base.html" %}
{% block css%}
    <link rel="stylesheet" href = "{{url_for('static', filename = 'css/property.css')}}">
    <!--<a href="https://www.flaticon.com/free-icons/room" title="room icons">Room icons created by xnimrodx - Flaticon</a>
    <a href="https://www.flaticon.com/free-icons/shower-head" title="shower head icons">Shower head icons created by fjstudio - Flaticon</a>-->
{%endblock %}
{% block main%}

    
<div id = "propContainer" class="container mt-4">
    <div class="card shadow-sm">
        <div class="row g-0">

            <div class="col-md-5">
                <img src="{{url_for('get_image', filename=property.filename)}}" 
                     class="img-fluid h-100 w-100 object-fit-cover" 
                     alt="property image">
            </div>

            <div id = "infoCard" class="col-md-7">
                <div class="card-body">

                    <h4 class="card-title">{{property.title}}</h4>

                    <div class="mb-2">
                        <span class="badge price-badge me-2">${{ "{:,}".format(property.price) }}</span>
                        <span class="badge type-badge me-2">{{property.ptype}}</span>
                    </div>

                    <p class="card-text text-muted">
                        {{property.desc}}
                    </p>

                    <div class="d-flex gap-4 mb-2">
                        <span><img class = "icon" src = "{{url_for('static', filename = 'img/bed.png')}}"> {{property.numRooms}} Bedrooms</span>
                        <span> <img class = "icon" src = "{{url_for('static', filename = 'img/shower.png')}}">{{property.numBaths}} Bathrooms</span>
                    </div>

                    <p class="text-muted mb-3">
                        <img class = "icon" src = "{{url_for('static', filename = 'img/gps.png')}}">{{property.location}}
                    </p>

                    <button class="btn custom-btn">Email Realtor</button>

                </div>
            </div>

        </div>
    </div>
</div>
    
{% endblock %}
